<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>쇼츠 차단됨 — noshorts</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f0f0f;
        color: #f1f1f1;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
      }
      .badge {
        width: 84px;
        height: 84px;
        margin: 0 auto 20px;
        border-radius: 50%;
        border: 6px solid #cc0000;
        position: relative;
      }
      .badge::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 90px;
        height: 6px;
        background: #cc0000;
        transform: translate(-50%, -50%) rotate(45deg);
        border-radius: 3px;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 10px;
      }
      p {
        font-size: 14px;
        line-height: 1.6;
        color: #aaaaaa;
        margin: 0 0 24px;
      }
      .actions {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }
      button {
        font-size: 14px;
        font-weight: 600;
        padding: 10px 18px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
      }
      .primary {
        background: #cc0000;
        color: #fff;
      }
      .ghost {
        background: transparent;
        color: #f1f1f1;
        border: 1px solid #555;
      }
      .hint {
        margin-top: 22px;
        font-size: 12px;
        color: #777;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge"></div>
      <h1 data-i18n="blockedHeading">Take a break from Shorts ✋</h1>
      <p data-i18n="blockedBody">
        noshorts blocked this YouTube Short. Instead of endless short videos,
        go find what you actually wanted to watch.
      </p>
      <div class="actions">
        <button class="primary" id="home" data-i18n="blockedHome">Go to YouTube home</button>
        <button class="ghost" id="back" data-i18n="blockedBack">Go back</button>
      </div>
      <div class="hint" data-i18n="blockedHint">To turn blocking off, use the noshorts icon in your toolbar.</div>
    </div>
    <script src="blocked.js"></script>
  </body>
</html>
