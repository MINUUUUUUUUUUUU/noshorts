<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>쇼츠 차단됨 — noshorts</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f0f0f;
        color: #f1f1f1;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
      }
      .badge {
        width: 84px;
        height: 84px;
        margin: 0 auto 20px;
        border-radius: 50%;
        border: 6px solid #cc0000;
        position: relative;
      }
      .badge::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 90px;
        height: 6px;
        background: #cc0000;
        transform: translate(-50%, -50%) rotate(45deg);
        border-radius: 3px;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 10px;
      }
      p {
        font-size: 14px;
        line-height: 1.6;
        color: #aaaaaa;
        margin: 0 0 24px;
      }
      .actions {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }
      button {
        font-size: 14px;
        font-weight: 600;
        padding: 10px 18px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
      }
      .primary {
        background: #cc0000;
        color: #fff;
      }
      .ghost {
        background: transparent;
        color: #f1f1f1;
        border: 1px solid #555;
      }
      .hint {
        margin-top: 22px;
        font-size: 12px;
        color: #777;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge"></div>
      <h1>쇼츠는 잠시 멈춰요 ✋</h1>
      <p>
        noshorts가 YouTube 쇼츠를 막았습니다.<br />
        짧은 영상의 무한 스크롤 대신, 진짜 보고 싶었던 걸 찾아보세요.
      </p>
      <div class="actions">
        <button class="primary" id="home">유튜브 홈으로</button>
        <button class="ghost" id="back">이전 페이지로</button>
      </div>
      <div class="hint">차단을 끄려면 툴바의 noshorts 아이콘에서 토글하세요.</div>
    </div>
    <script src="blocked.js"></script>
  </body>
</html>
