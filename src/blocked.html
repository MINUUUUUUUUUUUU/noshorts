<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shorts blocked — YouTube Shorts Blocker</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f0f0f;
        color: #f1f1f1;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
      }
      .logo-card {
        width: 180px;
        height: 180px;
        margin: 0 auto 20px;
        background: #ffffff;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
      }
      .logo-card img {
        width: 150px;
        height: 150px;
        display: block;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 10px;
      }
      p {
        font-size: 14px;
        line-height: 1.6;
        color: #aaaaaa;
        margin: 0 0 24px;
      }
      .actions {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }
      button {
        font-size: 14px;
        font-weight: 600;
        padding: 10px 18px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
      }
      .primary {
        background: #cc0000;
        color: #fff;
      }
      .ghost {
        background: transparent;
        color: #f1f1f1;
        border: 1px solid #555;
      }
      .hint {
        margin-top: 22px;
        font-size: 12px;
        color: #777;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo-card"><img src="../icons/logo.png" alt="YouTube Shorts Blocker" /></div>
      <h1 data-i18n="blockedHeading">Take a break from Shorts ✋</h1>
      <p data-i18n="blockedBody">
        This Short was blocked. Instead of endless short videos,
        go find what you actually wanted to watch.
      </p>
      <div class="actions">
        <button class="primary" id="home" data-i18n="blockedHome">Go to YouTube home</button>
        <button class="ghost" id="back" data-i18n="blockedBack">Go back</button>
      </div>
      <div class="hint" data-i18n="blockedHint">To turn blocking off, use the extension icon in your toolbar.</div>
    </div>
    <script src="blocked.js"></script>
  </body>
</html>
